<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>夜</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Noto Serif JP', serif;
      background: linear-gradient(to bottom, #1e1e2f, #3a3a5c, #5a5a7a);
      color: #ffffffcc;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      animation: fadeIn 2s ease;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 1rem;
      letter-spacing: 2px;
    }

    p {
      font-size: 1.2rem;
      max-width: 600px;
      margin: 0 auto;
      line-height: 1.8;
    }

    .line {
      width: 60%;
      height: 1px;
      background: #ffffff33;
      margin: 2rem 0;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    footer {
      position: absolute;
      bottom: 1rem;
      font-size: 0.8rem;
      color: #ffffff55;
    }
  </style>
</head>
<body>
  <h1>夜のまにまに</h1>
  <div class="line"></div>
  <p>
    この世界の静けさに、心を委ねて。<br>
    どこか懐かしくて、少し切ない。<br>
    そんな夜も、悪くないよね。
  </p>
  <footer>© 2025  company</footer>
</body>
</html>
